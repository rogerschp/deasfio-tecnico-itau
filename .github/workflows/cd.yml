name: CD

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Determine version and metadata
  # ---------------------------------------------------------------------------
  meta:
    name: Meta
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tags: ${{ steps.docker.outputs.tags }}
      labels: ${{ steps.docker.outputs.labels }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Docker meta
        id: docker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/compraprogramada
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

  build-api-gateway:
    name: Build ApiGateway
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ApiGateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/ApiGateway/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/compraprogramada-api-gateway:${{ needs.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-clientes:
    name: Build Clientes.Service
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Services/Clientes.Service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/compraprogramada-clientes:${{ needs.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-admin:
    name: Build Admin.Service
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Services/Admin.Service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/compraprogramada-admin:${{ needs.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-cotacao:
    name: Build Cotacao.Service
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Services/Cotacao.Service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/compraprogramada-cotacao:${{ needs.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-motor:
    name: Build MotorCompra.Service
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Services/MotorCompra.Service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/compraprogramada-motor:${{ needs.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-motor-worker:
    name: Build MotorCompra.Worker
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Services/MotorCompra.Worker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/compraprogramada-motor-worker:${{ needs.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-rebalanceamento:
    name: Build Rebalanceamento.Service
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Services/Rebalanceamento.Service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/compraprogramada-rebalanceamento:${{ needs.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cd-summary:
    name: CD Summary
    runs-on: ubuntu-latest
    needs:
      [
        meta,
        build-api-gateway,
        build-clientes,
        build-admin,
        build-cotacao,
        build-motor,
        build-motor-worker,
        build-rebalanceamento,
      ]
    if: success() && github.event_name != 'pull_request'
    steps:
      - name: Images built and pushed
        run: |
          echo "Version: ${{ needs.meta.outputs.version }}"
          echo "Images pushed to ${{ env.REGISTRY }}/${{ github.repository_owner }}/compraprogramada-*"
